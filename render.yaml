# Render Blueprint — https://render.com/docs/blueprint-spec
# New > Blueprint > connect this repo. Render reads this file, then asks you to
# paste OPENAI_API_KEY (it is NOT stored in the repo).
services:
  - type: web
    name: decision-debugger
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set this secret in the Render dashboard, not in git
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: PYTHON_VERSION
        value: 3.12.7
